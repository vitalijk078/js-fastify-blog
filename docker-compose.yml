services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: production
    image: paralyssiss/js-fastify-blog:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_NAME: blog
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_PORT: 5432
      DATABASE_HOST: db
    ports:
      - "8080:8080"
    restart: unless-stopped

  test:
    build:
      context: .
      target: test
    environment:
      NODE_ENV: test
    command: npm test

volumes:
  postgres_data: